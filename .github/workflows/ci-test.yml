name: CI Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-style:
    name: Check repository style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check repository formatting
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

  service-check:
    name: Check service - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            task: :services:gateway:check
          - service: iam
            task: :services:iam:check

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check ${{ matrix.service }}
        run: ./gradlew ${{ matrix.task }} --no-daemon --stacktrace

  shared-check:
    name: Check shared modules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check shared modules
        run: >-
          ./gradlew
          :shared:security:check
          :shared:messaging:check
          --no-daemon
          --stacktrace
