spring:
  application:
    name: gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: iam-api
              uri: ${IAM_BASE_URL:http://localhost:9000}
              predicates:
                - Path=/iam/**
              filters:
                - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

