spring:
  application:
    name: gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: iam-api
              uri: ${IAM_BASE_URL:http://localhost:9000}
              predicates:
                - Path=/api/v1/iam/**
              filters:
                - StripPrefix=3

cloudforge:
  security:
    secure-cookies: true

server:
  port: ${GATEWAY_SERVER_PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: local

cloudforge:
  security:
    allowed-origins: ${CLOUDFORGE_ALLOWED_ORIGINS:}
    secure-cookies: false
