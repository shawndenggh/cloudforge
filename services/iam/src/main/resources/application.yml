spring:
  application:
    name: iam
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iam}
    username: ${DB_USERNAME:cloudforge}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:cloudforge}
    password: ${RABBITMQ_PASSWORD:}
  session:
    redis:
      namespace: cloudforge:${APP_ENV:local}:session

cloudforge:
  iam:
    registration-rate-limit:
      namespace: cloudforge:${APP_ENV:local}:iam:registration-rate-limit
  security:
    secure-cookies: true

server:
  port: ${IAM_SERVER_PORT:${SERVER_PORT:9000}}
  servlet:
    session:
      cookie:
        name: cloudforge_session
        path: /
        http-only: true
        secure: ${cloudforge.security.secure-cookies}
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: local

cloudforge:
  security:
    secure-cookies: false
